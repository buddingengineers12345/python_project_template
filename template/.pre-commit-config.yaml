# .pre-commit-config.yaml
# Production-ready pre-commit configuration optimized for uv / ruff / BasedPyright.
# - Uses uv to run repo-managed tool versions
# - Keeps fast checks at commit stage, heavier checks at push/CI
# - Pin external hooks; review revs regularly (Renovate can help)

default_install_hook_types: [pre-commit, pre-push, commit-msg]

repos:
  # ---------------------------------------------------------------------------
  # Local hooks (use uv so versions are managed by pyproject.toml)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: forbidden-rej-files
        name: forbid Copier .rej rejection files
        entry: found Copier update rejection files; review and remove them before committing.
        language: fail
        files: \.rej$
      - id: ruff-format
        name: Ruff Format
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: true
        stages: [pre-commit]

      - id: ruff-check
        name: Ruff Lint (auto-fix)
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        types: [python]
        pass_filenames: true
        stages: [pre-commit]

      - id: basedpyright
        name: BasedPyright (type check)
        entry: uv run basedpyright
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      - id: just-check
        name: just check (read-only CI gate before push)
        entry: just check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # ---------------------------------------------------------------------------
  # Basic hygiene, YAML/TOML checks
  # ---------------------------------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        # Jinja templates contain secret-like placeholders; freshness JSON embeds git SHAs.
        exclude: ^(template/.*\.jinja|assets/file_freshness\.json)$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: check-json
        exclude: \.vscode/.*\.json$  # VS Code uses JSONC (allows comments)
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: debug-statements
      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "master"]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.10
    hooks:
      - id: commitizen
        stages: [commit-msg]
