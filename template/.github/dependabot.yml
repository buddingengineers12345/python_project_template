# https://docs.github.com/en/code-security/how-tos/secure-your-supply-chain/secure-your-dependencies/configuring-dependabot-version-updates
# Grouped weekly updates + no auto-rebase reduces PR churn (see docs/git-history-maintenance.md).
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    rebase-strategy: "disabled"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    rebase-strategy: "disabled"
    versioning-strategy: lockfile-only
    groups:
      python:
        patterns:
          - "*"
