    {
      "id": "pyproject_tool_sections",
      "type": "pyproject_sections",
      "root": "pyproject.toml",
      "template": "template/pyproject.toml.jinja",
      "sections": [
        {
          "name": "tool.ruff",
          "required_keys": [
            "line-length",
            "target-version"
          ]
        },
        {
          "name": "tool.ruff.lint",
          "required_keys": [
            "select",
            "ignore"
          ],
          "required_select_codes": [
            "D",
            "C90",
            "PERF",
            "T20"
          ]
        },
        {
          "name": "tool.ruff.lint.pydocstyle",
          "required_keys": [
            "convention"
          ]
        },
        {
          "name": "tool.ruff.lint.mccabe",
          "required_keys": [
            "max-complexity"
          ]
        },
        {
          "name": "tool.basedpyright",
          "required_keys": [
            "typeCheckingMode",
            "reportMissingTypeStubs"
          ]
        },
        {
          "name": "tool.pytest.ini_options",
          "required_keys": [
            "minversion",
            "testpaths"
          ]
        },
        {
          "name": "tool.coverage.report",
          "required_keys": [
            "precision",
            "show_missing",
            "skip_covered"
          ]
        }
      ]
    },
