{
  "version": 1,
  "checks": [
    {
      "id": "workflow_action_versions",
      "type": "workflow_action_versions",
      "pairs": [
        {
          "root": ".github/workflows/lint.yml",
          "template": "template/.github/workflows/lint.yml.jinja"
        },
        {
          "root": ".github/workflows/security.yml",
          "template": "template/.github/workflows/security.yml.jinja"
        },
        {
          "root": ".github/workflows/pre-commit-update.yml",
          "template": "template/.github/workflows/pre-commit-update.yml.jinja"
        },
        {
          "root": ".github/workflows/release.yml",
          "template": "template/.github/workflows/release.yml.jinja"
        },
        {
          "root": ".github/workflows/dependency-review.yml",
          "template": "template/.github/workflows/dependency-review.yml"
        },
        {
          "root": ".github/workflows/labeler.yml",
          "template": "template/.github/workflows/labeler.yml"
        }
      ]
    },
    {
      "id": "shared_hook_parity",
      "type": "exact_file_pairs",
      "pairs": [
        {
          "root": ".claude/hooks/pre-bash-block-no-verify.sh",
          "template": "template/.claude/hooks/pre-bash-block-no-verify.sh"
        },
        {
          "root": ".claude/hooks/pre-bash-git-push-reminder.sh",
          "template": "template/.claude/hooks/pre-bash-git-push-reminder.sh"
        },
        {
          "root": ".claude/hooks/pre-bash-commit-quality.sh",
          "template": "template/.claude/hooks/pre-bash-commit-quality.sh"
        },
        {
          "root": ".claude/hooks/pre-bash-coverage-gate.sh",
          "template": "template/.claude/hooks/pre-bash-coverage-gate.sh"
        },
        {
          "root": ".claude/hooks/pre-config-protection.sh",
          "template": "template/.claude/hooks/pre-config-protection.sh"
        },
        {
          "root": ".claude/hooks/pre-protect-uv-lock.sh",
          "template": "template/.claude/hooks/pre-protect-uv-lock.sh"
        },
        {
          "root": ".claude/hooks/post-edit-python.sh",
          "template": "template/.claude/hooks/post-edit-python.sh"
        },
        {
          "root": ".claude/hooks/post-edit-markdown.sh",
          "template": "template/.claude/hooks/post-edit-markdown.sh"
        },
        {
          "root": ".claude/hooks/post-edit-refactor-test-guard.sh",
          "template": "template/.claude/hooks/post-edit-refactor-test-guard.sh"
        },
        {
          "root": ".claude/hooks/pre-bash-branch-protection.sh",
          "template": "template/.claude/hooks/pre-bash-branch-protection.sh"
        },
        {
          "root": ".claude/hooks/pre-delete-protection.sh",
          "template": "template/.claude/hooks/pre-delete-protection.sh"
        },
        {
          "root": ".claude/hooks/post-bash-test-coverage-reminder.sh",
          "template": "template/.claude/hooks/post-bash-test-coverage-reminder.sh"
        },
        {
          "root": ".claude/hooks/post-write-test-structure.sh",
          "template": "template/.claude/hooks/post-write-test-structure.sh"
        },
        {
          "root": ".claude/hooks/post-bash-pr-created.sh",
          "template": "template/.claude/hooks/post-bash-pr-created.sh"
        },
        {
          "root": ".claude/hooks/pre-write-doc-file-warning.sh",
          "template": "template/.claude/hooks/pre-write-doc-file-warning.sh"
        },
        {
          "root": ".claude/hooks/pre-suggest-compact.sh",
          "template": "template/.claude/hooks/pre-suggest-compact.sh"
        },
        {
          "root": ".claude/hooks/pre-compact-save-state.sh",
          "template": "template/.claude/hooks/pre-compact-save-state.sh"
        },
        {
          "root": ".claude/hooks/session-start-bootstrap.sh",
          "template": "template/.claude/hooks/session-start-bootstrap.sh"
        },
        {
          "root": ".claude/hooks/stop-session-end.sh",
          "template": "template/.claude/hooks/stop-session-end.sh"
        },
        {
          "root": ".claude/hooks/stop-desktop-notify.sh",
          "template": "template/.claude/hooks/stop-desktop-notify.sh"
        },
        {
          "root": ".claude/hooks/stop-cost-tracker.sh",
          "template": "template/.claude/hooks/stop-cost-tracker.sh"
        },
        {
          "root": ".claude/hooks/stop-evaluate-session.sh",
          "template": "template/.claude/hooks/stop-evaluate-session.sh"
        }
      ]
    },
    {
      "id": "pyproject_tool_sections",
      "type": "pyproject_sections",
      "root": "pyproject.toml",
      "template": "template/pyproject.toml.jinja",
      "sections": [
        {
          "name": "tool.ruff",
          "required_keys": [
            "line-length",
            "target-version"
          ]
        },
        {
          "name": "tool.ruff.lint",
          "required_keys": [
            "select",
            "ignore"
          ],
          "required_select_codes": [
            "D",
            "C90",
            "PERF",
            "T20"
          ]
        },
        {
          "name": "tool.ruff.lint.pydocstyle",
          "required_keys": [
            "convention"
          ]
        },
        {
          "name": "tool.ruff.lint.mccabe",
          "required_keys": [
            "max-complexity"
          ]
        },
        {
          "name": "tool.basedpyright",
          "required_keys": [
            "typeCheckingMode",
            "reportMissingTypeStubs"
          ]
        },
        {
          "name": "tool.pytest.ini_options",
          "required_keys": [
            "minversion",
            "testpaths"
          ]
        },
        {
          "name": "tool.coverage.report",
          "required_keys": [
            "precision",
            "show_missing",
            "skip_covered"
          ]
        }
      ]
    },
    {
      "id": "shared_skill_parity",
      "type": "exact_file_pairs",
      "pairs": [
        {
          "root": ".claude/skills/tdd-test-planner/SKILL.md",
          "template": "template/.claude/skills/tdd-test-planner/SKILL.md"
        },
        {
          "root": ".claude/skills/tdd-workflow/SKILL.md",
          "template": "template/.claude/skills/tdd-workflow/SKILL.md"
        },
        {
          "root": ".claude/skills/test-quality-reviewer/SKILL.md",
          "template": "template/.claude/skills/test-quality-reviewer/SKILL.md"
        }
      ]
    }
  ]
}
