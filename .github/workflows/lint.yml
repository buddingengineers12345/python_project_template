# Lint workflow — runs ruff (format + lint), basedpyright (type checking), and pre-commit
# hooks on every push and PR.
#
# Docstring rules (D) are enforced by `ruff check` via pyproject `select`. The separate
# `just docs-check` recipe is the same D-only pass for clearer local output; no extra
# GitHub step is required for docstrings beyond this workflow's Ruff step.
#
# References:
#   Ruff documentation:         https://docs.astral.sh/ruff/
#   BasedPyright:               https://docs.basedpyright.com/
#   pre-commit:                 https://pre-commit.com/
#   Security hardening:         https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions
#   Concurrency best practices: https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/using-concurrency
#   Workflow permissions:       https://docs.github.com/en/actions/security-guides/automatic-token-authentication#modifying-the-permissions-for-the-github_token
name: Lint

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

# Least-privilege: read-only access is sufficient for linting.
permissions:
  contents: read

# Cancel redundant runs on the same branch/PR to save CI minutes.
concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra test

      - name: Ruff format (check)
        run: uv run ruff format --check .

      - name: Ruff lint (includes Google docstrings via pyproject)
        run: uv run ruff check .

      - name: BasedPyright
        run: uv run basedpyright

      - name: Root/template sync policy check
        run: uv run python scripts/check_root_template_sync.py

      # no-commit-to-branch blocks direct commits to main; SKIP avoids false failures when
      # checkout is on main (e.g. post-merge push) while still running the hook on git commit.
      - name: Pre-commit (all files)
        env:
          SKIP: no-commit-to-branch
        run: uv run pre-commit run --all-files
