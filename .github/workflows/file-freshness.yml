# Repository file freshness workflow
#
# This workflow intentionally triggers only on a schedule and manual dispatch.
# It commits generated artifacts back to the repository, and we avoid `on: push`
# to prevent feedback loops.
name: File Freshness

on:
  schedule:
    - cron: "30 3 * * *" # Daily at 03:30 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: file-freshness-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Generate freshness artifacts
        run: >
          uv run --active python scripts/repo_file_freshness.py
          --metric commits
          --green-max-commits 5
          --yellow-max-commits 20

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push (if changed)
        run: |
          git add docs/repo_file_status_report.md assets/file_freshness.json assets/freshness_summary.json assets/freshness_ignore.json
          if git diff --staged --quiet; then
            echo "No freshness changes to commit."
            exit 0
          fi
          git commit -m "chore: update file freshness report"
          git push
