name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Which semver part to bump (ignored if version is set)"
        type: choice
        required: false
        default: patch
        options:
          - patch
          - minor
          - major
      version:
        description: "Explicit version to set (X.Y.Z). If set, overrides bump."
        type: string
        required: false
      prerelease:
        description: "Mark the GitHub Release as a pre-release"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine version
        id: bump
        run: |
          # If this workflow was triggered by pushing a tag (vX.Y.Z), use that version.
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            ref="${GITHUB_REF_NAME}"
            if echo "${ref}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "version=${ref#v}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            echo "Unexpected tag ref: ${ref}" >&2
            exit 1
          fi

          if [ -n "${{ inputs.version }}" ]; then
            NEW_VERSION="$(uv run --active python scripts/bump_version.py --new-version "${{ inputs.version }}")"
          else
            NEW_VERSION="$(uv run --active python scripts/bump_version.py --bump "${{ inputs.bump }}")"
          fi
          echo "version=${NEW_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Commit version bump
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git add pyproject.toml
          git commit -m "chore(release): v${{ steps.bump.outputs.version }}"

      - name: Create tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git tag "v${{ steps.bump.outputs.version }}"

      - name: Push commit and tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git push origin HEAD
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --notes-file CHANGELOG.md \
            ${{ inputs.prerelease && '--prerelease' || '' }}
